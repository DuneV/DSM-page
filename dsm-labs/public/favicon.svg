<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#142430"/>
  <!-- gear teeth (8 teeth via rotated rects) -->
  <g fill="#ee826d">
    <rect x="28" y="4"  width="8" height="12" rx="2.5"/>
    <rect x="28" y="48" width="8" height="12" rx="2.5"/>
    <rect x="4"  y="28" width="12" height="8" rx="2.5"/>
    <rect x="48" y="28" width="12" height="8" rx="2.5"/>
    <rect x="28" y="4"  width="8" height="12" rx="2.5" transform="rotate(45 32 32)"/>
    <rect x="28" y="4"  width="8" height="12" rx="2.5" transform="rotate(-45 32 32)"/>
    <rect x="28" y="48" width="8" height="12" rx="2.5" transform="rotate(45 32 32)"/>
    <rect x="28" y="48" width="8" height="12" rx="2.5" transform="rotate(-45 32 32)"/>
  </g>
  <!-- outer ring -->
  <circle cx="32" cy="32" r="18" fill="#ee826d"/>
  <!-- inner cutout -->
  <circle cx="32" cy="32" r="10" fill="#142430"/>
  <!-- center dot -->
  <circle cx="32" cy="32" r="3.5" fill="#ee826d"/>
</svg>
